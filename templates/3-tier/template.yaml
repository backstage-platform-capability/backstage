apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: infra-merged-template
  title: Infra Provisioning (Key Vault + VM + SQLMI)
  description: >
    Single merged template to scaffold Azure Key Vault (RBAC), VM definitions,
    and Azure SQL Managed Instance (CAF standard) outputs in one repository.
spec:
  owner: user:default/platform-team
  type: infrastructure

  parameters:
    - title: 3-tier Infrastructure Parameters
      description: Configure parameters for Key Vault, VM, and SQLMI outputs. Only fill in parameters relevant to the components you want to generate
      properties:
        create_key_vault:
          title: Generate Key Vault output
          type: boolean
          default: true
        create_vms:
          title: Generate VM output
          type: boolean
          default: false
        create_sqlmi:
          title: Generate SQL Managed Instance output
          type: boolean
          default: false
        publish_to_github:
          title: Publish to GitHub
          type: boolean
          default: true
      dependencies:
        create_key_vault:
          oneOf:
            - properties:
                create_key_vault:
                  const: false
            - properties:
                create_key_vault:
                  const: true
                # --- Key Vault Parameters (defaults preserved) ---
                key_vault_name:
                  title: Key Vault Name
                  type: string
                  description: Name of the Azure Key Vault
                resource_group_name:
                  title: Resource Group Name
                  type: string
                sku_name:
                  title: SKU
                  type: string
                  enum: [standard, premium]
                  default: standard
                soft_delete_retention_days:
                  title: Soft Delete Retention (days)
                  type: number
                  default: 7
                purge_protection_enabled:
                  title: Purge Protection Enabled
                  type: boolean
                  default: true
                enable_rbac_authorization:
                  title: Enable RBAC Authorization
                  type: boolean
                  default: true
                default_action:
                  title: Default Network Action
                  type: string
                  enum: [Allow, Deny]
                  default: Allow
                bypass:
                  title: Bypass
                  type: string
                  enum: [AzureServices, None]
                  default: AzureServices
                role_definition_name:
                  title: Role Definition
                  type: string
                  default: Key Vault Crypto User
                user_names:
                  title: User Principal Names
                  type: array
                  items:
                    type: string
                  description: Azure AD users
                  default: []
                group_names:
                  title: Group Names
                  type: array
                  items:
                    type: string
                  default: []
              required:
                - key_vault_name
                - resource_group_name
        create_vms:
          oneOf:
            - properties:
                create_vms:
                  const: false
            - properties:
                create_vms:
                  const: true
                # --- VM Parameters (kept from your VM template) ---
                Infra:
                  type: array
                  title: Infrastructure Components
                  minItems: 1
                  items:
                    type: object
                    properties:
                      resource_label:
                        title: Resource Label
                        type: string
                        enum: ['01', '02', '03', '04', '05']
                        enumNames: ['01', '02', '03', '04', '05']
                      tier_type:
                        title: Tier Type
                        type: string
                        enum: [3-tier, 2-tier]
                      compliance_type:
                        title: Compliance Type
                        type: string
                        enum: [PII, PCI, GDPR]
                      database_type:
                        title: Database Type
                        type: string
                        enum: [SQLMI, SQLDB, PGSQL]
                      compute_type:
                        title: Compute Type
                        type: string
                        enum: [AKS, VM]
                    dependencies:
                      compute_type:
                        oneOf:
                          - properties:
                              compute_type:
                                const: AKS
                              subscription:
                                title: Infrastructure Details
                                description: Choose the Infrastructure details based on the compute type selection
                                type: object
                          - properties:
                              compute_type:
                                const: VM
                              subscription:
                                title: Infrastructure Details
                                description: Choose the Infrastructure details based on the compute type selection
                                type: object
                                properties:
                                  os_type:
                                    title: OS Type
                                    type: string
                                    enum: [linux, windows]
                                  vm_count:
                                    title: Number of VMs
                                    type: integer
                                    default: 1
                                    minimum: 1
                                    maximum: 20
                                  vm_list:
                                    title: Virtual Machines
                                    type: array
                                    minItems: 1
                                    items:
                                      type: object
                                      properties:
                                        vm_name:
                                          title: VM Name
                                          type: string
                                  sku:
                                    title: SKU
                                    type: string
                                    enum:
                                      - Standard_1
                                      - Standard_D2
                                      - Standard_D3
                                      - Standard_E1
                                      - Standard_E2
                                  # resource_group_name:
                                  #   title: Resource Group Name
                                  #   type: string
                                  # key_vault_name:
                                  #   title: Key Vault Name
                                  #   type: string
                                  nic_name:
                                    title: NIC Name
                                    type: string
                                  os_disk_type:
                                    title: OS Disk Type
                                    type: string
                                    enum: [StandardSSD_LRS, Standard_LRS]
                                  managed_disk_name:
                                    title: Managed Disk Name
                                    type: string
                                  disk_size:
                                    title: Disk Size
                                    type: string
                                    default: "1GB"
                                  disk_mount:
                                    title: Disk Mount Path
                                    type: string
                                    default: "/disk-0-0"
                                  admin_username:
                                    title: Admin Username
                                    type: string
                                    default: "azureuser"
                                  admin_password_secret_name:
                                    title: Admin Password Secret Name
                                    type: string
                                  vnet_name:
                                    title: VNet Name
                                    type: string
                                  subnet_name:
                                    title: Subnet Name
                                    type: string
                                dependencies:
                                  os_type:
                                    oneOf:
                                      - properties:
                                          os_type:
                                            const: linux
                                          os_version:
                                            title: OS Version
                                            type: string
                                            enum: [Ubuntu-20.04, Ubuntu-22.04, RHEL-8, RHEL-9]
                                      - properties:
                                          os_type:
                                            const: windows
                                          os_version:
                                            title: OS Version
                                            type: string
                                            enum: [Windows-2019, Windows-2022]
                                        required: [os_version]
        create_sqlmi:
          oneOf:
            - properties:
                create_sqlmi:
                  const: false
            - properties:
                create_sqlmi:
                  const: true
                # --- SQLMI Parameters (from your SQLMI CAF template) ---
                appCode:
                  type: string
                  title: Application code
                  pattern: '^[a-z0-9-]+$'
                environment:
                  type: string
                  title: Environment
                  enum: [dev, tst, prd]
                  default: dev
                regionShort:
                  type: string
                  title: Azure region short name
                  pattern: '^[a-z0-9]+$'
                  default: cus
                azureRegion:
                  type: string
                  title: Azure region (location)
                  default: centralus
                owner:
                  type: string
                  title: Backstage owner
                  default: group:cloud-platform
                system:
                  type: string
                  title: Backstage system
                  default: system:core-banking
                licenseType:
                  type: string
                  title: License type
                  enum: [BasePrice, PriceIncluded]
                  default: BasePrice
                skuName:
                  type: string
                  title: SKU name
                  enum: [GP_Gen5, GP_Gen4, BC_Gen5, BC_Gen4]
                  default: GP_Gen5
                vcores:
                  type: integer
                  title: vCores
                  default: 4
                  minimum: 2
                storageSizeInGb:
                  type: integer
                  title: Storage size (GB)
                  default: 32
                  multipleOf: 32
                administratorLogin:
                  type: string
                  title: Administrator login name
                  default: azureuser
                enableFailover:
                  type: boolean
                  title: Enable failover instance
                  default: true
                useStandardCafVnetNames:
                  type: boolean
                  title: Use CAF-based VNet/Subnet names
                  default: true
                existingVnetName:
                  type: string
                  title: Existing VNet name (if not using CAF-generated)
                  default: ""
                existingSubnetName:
                  type: string
                  title: Existing subnet name (if not using CAF-generated)
                  default: ""
                vnetResourceGroupName:
                  type: string
                  title: VNet resource group name (optional)
                  default: ""
                databaseNames:
                  type: array
                  title: Database names
                  items:
                    type: string
                  default: [appdb]
                adminUsers:
                  type: array
                  title: Azure AD user UPNs
                  items:
                    type: string
                  default: [user1@contoso.onmicrosoft.com]
                azureAdAuthOnly:
                  type: boolean
                  title: Azure AD authentication only
                  default: false
                secretExpirationDate:
                  type: string
                  title: Secret expiration date (optional)
                  default: ""
                terraformPath:
                  type: string
                  title: Terraform directory
                  default: infra/sqlmi/dev
                subscriptionId:
                  type: string
                  title: Azure subscription ID (optional)
                  default: ""
              required:
                - appCode
                - environment
                - regionShort
                - azureRegion
                - owner
                - system
                - licenseType
                - skuName
                - vcores
                - storageSizeInGb
                - administratorLogin
                - enableFailover

  steps:
    - id: fetch
      name: Fetching skeleton templates
      action: fetch:template
      input:
        url: ./skeleton
        values:
          key_vault_name: ${{ parameters.key_vault_name }}
          resource_group_name: ${{ parameters.resource_group_name }}
          sku_name: ${{ parameters.sku_name }}
          soft_delete_retention_days: ${{ parameters.soft_delete_retention_days }}
          purge_protection_enabled: ${{ parameters.purge_protection_enabled }}
          enable_rbac_authorization: ${{ parameters.enable_rbac_authorization }}
          default_action: ${{ parameters.default_action }}
          bypass: ${{ parameters.bypass }}
          role_definition_name: ${{ parameters.role_definition_name }}
          user_names: ${{ parameters.user_names }}
          group_names: ${{ parameters.group_names }}
    # - id: fetch-vm
    #   if: ${{ parameters.create_vms }}
    #   name: Render VM skeleton
    #   action: fetch:template
    #   input:
    #     url: ./skeleton
    #     templateFileExtension: ".njk"
    #     copyWithoutRender:
    #       - "**/*.png"
    #       - "**/*.jpg"
    #       - "**/*.zip"
    #     values:
    #       dependencies: ${{ parameters.Infra }}
    #       tier_type: ${{ parameters.Infra[0].tier_type }}
    #       compliance_type: ${{ parameters.Infra[0].compliance_type }}
    #       database_type: ${{ parameters.Infra[0].database_type }}
    #       compute_type: ${{ parameters.Infra[0].compute_type }}
    #       resource_label: ${{ parameters.Infra[0].resource_label }}
    # - id: fetch-sqlmi
    #   if: ${{ parameters.create_sqlmi }}
    #   name: Render SQLMI skeleton
    #   action: fetch:template
    #   input:
    #     url: ./skeleton
    #     templateFileExtension: ".njk"
    #     copyWithoutRender:
    #       - "**/*.png"
    #       - "**/*.jpg"
    #       - "**/*.zip"
    #     values:
    #       appCode: ${{ parameters.appCode }}
    #       environment: ${{ parameters.environment }}
    #       regionShort: ${{ parameters.regionShort }}
    #       azureRegion: ${{ parameters.azureRegion }}
    #       owner: ${{ parameters.owner }}
    #       system: ${{ parameters.system }}
    #       licenseType: ${{ parameters.licenseType }}
    #       skuName: ${{ parameters.skuName }}
    #       vcores: ${{ parameters.vcores }}
    #       storageSizeInGb: ${{ parameters.storageSizeInGb }}
    #       administratorLogin: ${{ parameters.administratorLogin }}
    #       enableFailover: ${{ parameters.enableFailover }}
    #       useStandardCafVnetNames: ${{ parameters.useStandardCafVnetNames }}
    #       existingVnetName: ${{ parameters.existingVnetName }}
    #       existingSubnetName: ${{ parameters.existingSubnetName }}
    #       vnetResourceGroupName: ${{ parameters.vnetResourceGroupName }}
    #       databaseNames: ${{ parameters.databaseNames }}
    #       adminUsers: ${{ parameters.adminUsers }}
    #       azureAdAuthOnly: ${{ parameters.azureAdAuthOnly }}
    #       secretExpirationDate: ${{ parameters.secretExpirationDate }}
    #       terraformPath: ${{ parameters.terraformPath }}
    #       subscriptionId: ${{ parameters.subscriptionId }}
    # - id: publish
    #   if: ${{ parameters.publish_to_github && parameters.resource_group_name }}
    #   name: Publish Repository
    #   action: publish:github
    #   input:
    #     repoUrl: github.com?owner=backstage-platform-capability&repo=app-3-tier-${{ parameters.resource_group_name }}
    #     description: Merged infra outputs (Key Vaulkeyt / VM / SQLMI)
    #     defaultBranch: main
    #     repoVisibility: public
    - id: download
      name: Download Master ZIP
      action: download:filesystem
      
  output:
    links:
      - title: Download Template
        url: ${{ steps.download.output.path }}